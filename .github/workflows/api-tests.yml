# All unit tests live under api/ (Vitest). Failing this workflow blocks visibility of a green check on the commit.
# Email alerts: https://github.com/settings/notifications → Actions → enable failed workflow notifications.

name: Unit tests

concurrency:
  group: unit-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api:
    name: API (typecheck + Vitest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run type-check

      - name: Unit tests (with coverage gates)
        run: npm run build

  notify-on-failure:
    name: Tests failed — see api job
    runs-on: ubuntu-latest
    needs: api
    if: failure()
    steps:
      - name: Summary and annotation
        run: |
          {
            echo "## Unit tests failed"
            echo ""
            echo "Open the **API (typecheck + Vitest + coverage)** job logs above."
            echo ""
            echo "Reproduce locally: \`cd api && npm ci && npm run build\`"
            echo ""
            echo "**Email when CI breaks:** [GitHub → Settings → Notifications](https://github.com/settings/notifications) → *Actions* → turn on failed workflow notifications (and watch the repo if you want commit emails)."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error title=Unit tests failed::api/: typecheck, Vitest, or coverage thresholds failed. Run: cd api && npm run build"
